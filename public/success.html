<script type="module">
import { db } from "./firebase/setup.js";
import { ref, runTransaction } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

const params = new URLSearchParams(location.search);

const contestantId = params.get("contestantId");
const votes = Number(params.get("votes") || 1);

if (contestantId) {

  await runTransaction(
    ref(db, `contestants/${contestantId}/votes`),
    v => (v || 0) + votes
  );

  alert("✅ Payment successful! Votes added.");
  window.location.href = "/vote.html";
}
</script>
