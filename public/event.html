<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grand Finale Event – Kwara Talent Harvest</title>
  <meta name="viewport" content="width=device-width">
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles/voting.css">
  <style>
    .event-banner {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1.5rem 2rem;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.05), rgba(34, 197, 94, 0.02));
      border-bottom: 2px solid rgba(34, 197, 94, 0.3);
      margin: 1rem 0;
    }

    .event-banner-left {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 0 0 100px;
    }

    .banner-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 10px;
    }

    .event-banner-center {
      flex: 1;
    }

    .event-banner-center h1 {
      font-size: 1.8rem;
      margin: 0 0 0.3rem 0;
      color: #22c55e;
    }

    .event-banner-center p {
      margin: 0;
      opacity: 0.8;
      font-size: 0.95rem;
    }

    .event-banner-right {
      flex: 0 0 auto;
    }

    .quick-info {
      display: flex;
      gap: 1.5rem;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-width: 80px;
    }

    .info-label {
      font-size: 0.75rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-size: 1.1rem;
      font-weight: bold;
      color: #22c55e;
    }

    /* Premium ticket cards */
    .ticket-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      min-height: 340px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      background: transparent;
      display: block;
    }

    .ticket-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(34, 197, 94, 0.3);
    }

    .ticket-img-wrapper {
      position: relative;
      overflow: hidden;
      min-height: 340px;
      width: 100%;
      cursor: pointer;
    }

    .ticket-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .ticket-img-wrapper:hover img,
    .ticket-img-wrapper.expanded img {
      transform: scale(1.08);
    }

    .ticket-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.2) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      z-index: 2;
    }

    .ticket-badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(255, 255, 255, 0.95);
      color: #0f172a;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15);
    }

    .overlay-top {
      width: 100%;
      display: flex;
      justify-content: flex-end;
    }

    .overlay-center {
      width: 100%;
      padding: 0 1rem;
      text-align: center;
    }

    .overlay-center h3 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .overlay-center .description {
      margin: 0.35rem 0 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.85rem;
      line-height: 1.35;
    }

    .overlay-stats {
      display: flex;
      gap: 0.75rem;
      align-self: center;
      margin-top: 0.5rem;
    }

    .center-stats {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }

    .overlay-actions {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }

    .overlay-actions .btn-buy {
      flex: 1 1 220px;
      max-width: 280px;
    }

    .bottom-share {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-top: 0.85rem;
    }

    .overlay-actions .social-share {
      display: none;
    }

    .overlay-stat {
      background: rgba(34, 197, 94, 0.9);
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      text-align: center;
      min-width: 65px;
    }

    .overlay-stat-label {
      display: block;
      font-size: 0.65rem;
      opacity: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }

    .overlay-stat-value {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
    }

    .ticket-info {
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex: 1;
    }

    .ticket-header {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .ticket-info h3 {
      margin: 0;
      font-size: 0.95rem;
      color: #fff;
      font-weight: 800;
      text-align: left;
    }

    .description {
      opacity: 0.85;
      font-size: 0.8rem;
      margin: 0;
      line-height: 1.3;
      text-align: left;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .btn-buy {
      flex: 1;
      padding: 0.65rem 0.75rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #060b10;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .btn-buy:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(34, 197, 94, 0.25);
    }

    .btn-buy:disabled {
      background: #4b5563;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .social-share {
      display: flex;
      gap: 0.25rem;
    }

    .social-btn {
      width: 2.2rem;
      height: 2.2rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-btn:hover {
      transform: scale(1.1);
      opacity: 0.8;
    }

    .social-btn.whatsapp { background: #25d366; color: white; }
    .social-btn.facebook { background: #1877f2; color: white; }
    .social-btn.instagram { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); color: white; }
    .social-btn.tiktok { background: #000000; color: white; }
    .social-btn.twitter { background: #1da1f2; color: white; }

    .ticket-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(34, 197, 94, 0.12);
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      display: block;
      font-size: 0.72rem;
      opacity: 0.72;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      color: #22c55e;
    }

    .btn-buy {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #060b10;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 0.3rem;
    }

    .btn-buy:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(34, 197, 94, 0.25);
    }

    .btn-buy:disabled {
      background: #4b5563;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .btn-share {
      width: 3rem;
      min-width: 3rem;
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.16);
      color: #22c55e;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      border: 1px solid rgba(34, 197, 94, 0.4);
      margin-top: 0.3rem;
    }

    .btn-share:hover {
      transform: translateY(-1px);
      background: rgba(34, 197, 94, 0.28);
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    .flash-banner {
      background: rgba(34, 197, 94, 0.08);
      border-left: 4px solid #22c55e;
      padding: 1.2rem 1.5rem;
      margin: 1rem 2rem;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    .flash-content {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .flash-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }

    .flash-text strong {
      display: block;
      font-size: 0.95rem;
      color: #22c55e;
      margin-bottom: 0.3rem;
    }

    .flash-text p {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .event-banner {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .event-banner-left {
        flex: 0 0 70px;
      }

      .banner-logo {
        width: 60px;
        height: 60px;
      }

      .event-banner-center h1 {
        font-size: 1.4rem;
      }

      .event-banner-right {
        width: 100%;
      }

      .quick-info {
        justify-content: space-around;
        width: 100%;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
        padding: 1rem;
      }

      .flash-banner {
        margin: 1rem;
        padding: 0.8rem 1rem;
      }

      .flash-content {
        flex-direction: column;
        gap: 0.5rem;
      }

      .flash-icon {
        font-size: 1.2rem;
      }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      animation: fadeIn 0.2s ease;
      align-items: center;
      justify-content: center;
    }

    .modal:not(.hidden) {
      display: flex !important;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
      padding: 2rem;
      border: 1px solid #22c55e;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      position: relative;
      box-shadow: 0 20px 60px rgba(34, 197, 94, 0.3);
      animation: slideUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-content h2 {
      margin-bottom: 0.5rem;
      color: #fff;
      font-size: 1.5rem;
    }

    #modalContestantName {
      color: #22c55e;
      font-weight: bold;
      margin-bottom: 1.5rem !important;
      display: block;
    }

    .modal-content label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      color: #ccc;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .modal-content input {
      width: 100%;
      padding: 0.9rem;
      margin-bottom: 0.5rem;
      border: 1px solid #22c55e;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.05);
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .modal-content input:focus {
      outline: none;
      background: rgba(34, 197, 94, 0.1);
      border-color: #4ade80;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
    }

    .modal-content input::placeholder {
      color: #888;
    }

    .price {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
      padding: 1.2rem;
      border-radius: 10px;
      margin: 1.5rem 0;
      font-weight: bold;
      color: #4ade80;
      border-left: 4px solid #22c55e;
      font-size: 1.1rem;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    .btn.primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #000;
    }

    .btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
    }

    .btn.secondary {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid #3b82f6;
      color: #60a5fa;
    }

    .btn.secondary:hover {
      background: rgba(59, 130, 246, 0.3);
      transform: translateY(-2px);
    }

    .close {
      position: absolute;
      right: 1.5rem;
      top: 1.5rem;
      background: none;
      border: none;
      color: #999;
      font-size: 1.8rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .close:hover {
      color: #22c55e;
    }
  </style>
</head>
<body>

<header class="top">
  <a href="index.html">
    <div class="event-banner">
  <div class="event-banner-left">
    <img src="assets/logo.png" class="banner-logo" alt="Logo">
  </div>
  </a>
  
  <div class="event-banner-center">
    <h1>Grand Finale Event</h1>
    <p>Kwara Talent Harvest 2026</p>
  </div>
  <div class="event-banner-right">
    <div class="quick-info">
      <div class="info-item">
        <span class="info-label">Date</span>
        <span class="info-value" id="eventDate">May 16</span>
      </div>
      <div class="info-item">
        <span class="info-label">Price</span>
        <span class="info-value">₦5,000</span>
      </div>
      <div class="info-item">
        <span class="info-label">Available</span>
        <span class="info-value">400</span>
      </div>
    </div>
  </div>
</div>

<div class="flash-banner">
  <div class="flash-content">
    <span class="flash-icon">🎟️</span>
    <div class="flash-text">
      <strong>Secure Your Seat Now!</strong>
      <p>Support your favorite talent. Only 20 tickets per contestant — get yours before they sell out!</p>
    </div>
  </div>
</div>

</header>


<section class="grid" id="contestants"></section>

<div id="ticketModal" class="modal hidden">
  <div class="modal-content">

    <h2>🎟️ Purchase Event Ticket</h2>
    <p id="modalContestantName" style="color: #22c55e; font-weight: bold; margin-bottom: 1rem;"></p>

    <label>Email</label>
    <input type="email" id="ticketEmail" placeholder="Enter your email">

    <label>Full Name</label>
    <input type="text" id="ticketName" placeholder="Enter your full name">

    <label>Phone Number</label>
    <input type="tel" id="ticketPhone" placeholder="Enter your phone number">

    <label>Number of Tickets</label>
    <input type="number" id="ticketQty" min="1" max="5" value="1">

    <p class="price">
      Total: ₦<span id="ticketAmount">50</span>
    </p>

    <div class="modal-actions">
      <button onclick="payWithPaystack()" class="btn primary">
        ⚡ Pay Now (Paystack)
      </button>

      <button onclick="payManual()" class="btn secondary">
        💳 Manual Payment
      </button>
    </div>

    <button class="close" onclick="closeModal()">✖</button>

  </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script type="module" src="scripts/event.js"></script>
</body>
</html>
