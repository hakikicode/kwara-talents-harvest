<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grand Finale Event – Kwara Talent Harvest</title>
  <meta name="viewport" content="width=device-width">
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles/voting.css">
  <style>
    .event-banner {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1.5rem 2rem;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.05), rgba(34, 197, 94, 0.02));
      border-bottom: 2px solid rgba(34, 197, 94, 0.3);
      margin: 1rem 0;
    }

    .event-banner-left {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 0 0 100px;
    }

    .banner-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 10px;
    }

    .event-banner-center {
      flex: 1;
    }

    .event-banner-center h1 {
      font-size: 1.8rem;
      margin: 0 0 0.3rem 0;
      color: #22c55e;
    }

    .event-banner-center p {
      margin: 0;
      opacity: 0.8;
      font-size: 0.95rem;
    }

    .event-banner-right {
      flex: 0 0 auto;
    }

    .quick-info {
      display: flex;
      gap: 1.5rem;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-width: 80px;
    }

    .info-label {
      font-size: 0.75rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-size: 1.1rem;
      font-weight: bold;
      color: #22c55e;
    }

    /* Premium ticket cards */
    .ticket-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .ticket-card:hover {
      transform: translateY(-8px);
      border-color: rgba(34, 197, 94, 0.6);
      box-shadow: 0 20px 40px rgba(34, 197, 94, 0.2);
    }

    .ticket-img-wrapper {
      position: relative;
      overflow: hidden;
      height: 300px;
    }

    .ticket-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .ticket-card:hover .ticket-img-wrapper img {
      transform: scale(1.05);
    }

    .ticket-overlay {
      position: absolute;
      top: 0;
      right: 0;
      padding: 1rem;
    }

    .ticket-badge {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #000;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      display: inline-block;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    .ticket-info {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .ticket-info h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.3rem;
      color: #fff;
    }

    .description {
      opacity: 0.7;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .ticket-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(34, 197, 94, 0.1);
      border-radius: 10px;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      display: block;
      font-size: 0.8rem;
      opacity: 0.6;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      display: block;
      font-size: 1.1rem;
      font-weight: bold;
      color: #22c55e;
    }

    .btn-buy {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: auto;
    }

    .btn-buy:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
    }

    .btn-buy:disabled {
      background: #666;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      padding: 2rem;
    }

    .flash-banner {
      background: rgba(34, 197, 94, 0.08);
      border-left: 4px solid #22c55e;
      padding: 1.2rem 1.5rem;
      margin: 1rem 2rem;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    .flash-content {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .flash-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }

    .flash-text strong {
      display: block;
      font-size: 0.95rem;
      color: #22c55e;
      margin-bottom: 0.3rem;
    }

    .flash-text p {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .event-banner {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .event-banner-left {
        flex: 0 0 70px;
      }

      .banner-logo {
        width: 60px;
        height: 60px;
      }

      .event-banner-center h1 {
        font-size: 1.4rem;
      }

      .event-banner-right {
        width: 100%;
      }

      .quick-info {
        justify-content: space-around;
        width: 100%;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
        padding: 1rem;
      }

      .flash-banner {
        margin: 1rem;
        padding: 0.8rem 1rem;
      }

      .flash-content {
        flex-direction: column;
        gap: 0.5rem;
      }

      .flash-icon {
        font-size: 1.2rem;
      }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      animation: fadeIn 0.2s ease;
      align-items: center;
      justify-content: center;
    }

    .modal:not(.hidden) {
      display: flex !important;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
      padding: 2rem;
      border: 1px solid #22c55e;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      position: relative;
      box-shadow: 0 20px 60px rgba(34, 197, 94, 0.3);
      animation: slideUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-content h2 {
      margin-bottom: 0.5rem;
      color: #fff;
      font-size: 1.5rem;
    }

    #modalContestantName {
      color: #22c55e;
      font-weight: bold;
      margin-bottom: 1.5rem !important;
      display: block;
    }

    .modal-content label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      color: #ccc;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .modal-content input {
      width: 100%;
      padding: 0.9rem;
      margin-bottom: 0.5rem;
      border: 1px solid #22c55e;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.05);
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .modal-content input:focus {
      outline: none;
      background: rgba(34, 197, 94, 0.1);
      border-color: #4ade80;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
    }

    .modal-content input::placeholder {
      color: #888;
    }

    .price {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
      padding: 1.2rem;
      border-radius: 10px;
      margin: 1.5rem 0;
      font-weight: bold;
      color: #4ade80;
      border-left: 4px solid #22c55e;
      font-size: 1.1rem;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    .btn.primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #000;
    }

    .btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
    }

    .btn.secondary {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid #3b82f6;
      color: #60a5fa;
    }

    .btn.secondary:hover {
      background: rgba(59, 130, 246, 0.3);
      transform: translateY(-2px);
    }

    .close {
      position: absolute;
      right: 1.5rem;
      top: 1.5rem;
      background: none;
      border: none;
      color: #999;
      font-size: 1.8rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .close:hover {
      color: #22c55e;
    }
  </style>
</head>
<body>

<header class="top">
  <a href="index.html">
    <div class="event-banner">
  <div class="event-banner-left">
    <img src="assets/logo.png" class="banner-logo" alt="Logo">
  </div>
  </a>
  
  <div class="event-banner-center">
    <h1>Grand Finale Event</h1>
    <p>Kwara Talent Harvest 2026</p>
  </div>
  <div class="event-banner-right">
    <div class="quick-info">
      <div class="info-item">
        <span class="info-label">Date</span>
        <span class="info-value" id="eventDate">May 16</span>
      </div>
      <div class="info-item">
        <span class="info-label">Price</span>
        <span class="info-value">₦5,000</span>
      </div>
      <div class="info-item">
        <span class="info-label">Available</span>
        <span class="info-value">400</span>
      </div>
    </div>
  </div>
</div>

<div class="flash-banner">
  <div class="flash-content">
    <span class="flash-icon">🎟️</span>
    <div class="flash-text">
      <strong>Secure Your Seat Now!</strong>
      <p>Support your favorite talent. Only 20 tickets per contestant — get yours before they sell out!</p>
    </div>
  </div>
</div>

</header>


<section class="grid" id="contestants"></section>

<div id="ticketModal" class="modal hidden">
  <div class="modal-content">

    <h2>🎟️ Purchase Event Ticket</h2>
    <p id="modalContestantName" style="color: #22c55e; font-weight: bold; margin-bottom: 1rem;"></p>

    <label>Email</label>
    <input type="email" id="ticketEmail" placeholder="Enter your email">

    <label>Full Name</label>
    <input type="text" id="ticketName" placeholder="Enter your full name">

    <label>Phone Number</label>
    <input type="tel" id="ticketPhone" placeholder="Enter your phone number">

    <label>Number of Tickets</label>
    <input type="number" id="ticketQty" min="1" max="5" value="1">

    <p class="price">
      Total: ₦<span id="ticketAmount">50</span>
    </p>

    <div class="modal-actions">
      <button onclick="payWithPaystack()" class="btn primary">
        ⚡ Pay Now (Paystack)
      </button>

      <button onclick="payManual()" class="btn secondary">
        💳 Manual Payment
      </button>
    </div>

    <button class="close" onclick="closeModal()">✖</button>

  </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script type="module" src="scripts/event.js"></script>
</body>
</html>
