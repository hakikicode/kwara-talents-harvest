<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kwara Talent Harvest — Admin</title>
  <link rel="stylesheet" href="styles/admin.css">
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="glass">
    <img src="assets/logo.png" style="height:42px">
    <h2>Admin Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="status"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="glass" style="display:none">
    <div class="topbar">
      <h3>Pending Contestants</h3>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div id="list"></div>
  </div>

</div>

<script src="scripts/admin.js"></script>
</body>
</html>
