<h1>📊 Admin Dashboard</h1>

<p>Total Revenue: ₦<span id="revenue">0</span></p>
<p>Total Votes: <span id="votes">0</span></p>

<div id="top"></div>

<script type="module">
import { db } from "./firebase/setup.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

const revenueEl = document.getElementById("revenue");
const votesEl = document.getElementById("votes");
const topEl = document.getElementById("top");

// 🔥 TOTAL REVENUE
onValue(ref(db, "transactions"), snap => {
  const data = snap.val() || {};

  let total = 0;

  Object.values(data).forEach(t => {
    total += t.amount || 0;
  });

  revenueEl.textContent = total.toLocaleString();
});

// 🔥 TOTAL VOTES + TOP USERS
onValue(ref(db, "contestants"), snap => {
  const data = snap.val() || {};

  let totalVotes = 0;

  const arr = Object.entries(data).map(([id, c]) => {
    totalVotes += c.votes || 0;
    return { id, votes: c.votes || 0 };
  });

  votesEl.textContent = totalVotes;

  arr.sort((a,b)=>b.votes-a.votes);

  topEl.innerHTML = arr.slice(0,5).map(c =>
    `<p>${c.id} — ${c.votes} votes</p>`
  ).join("");
});
await runTransaction(
  ref(db, `contestants/${id}/votes`),
  v => (v || 0) + 50
);
await fetch("/api/manual-add-votes", {
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body: JSON.stringify({
    contestantId:"john_doe",
    votes:20,
    adminKey:"SECRET"
  })
});
</script>
