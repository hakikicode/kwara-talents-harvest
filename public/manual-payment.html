<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manual Payment</title>

<style>
body {
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#020617;
  padding:25px;
  border-radius:12px;
  width:320px;
  border:1px solid #1f2937;
}

input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#22c55e;
  color:#fff;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="manual-container">

  <h2>💳 Manual Payment</h2>

  <div class="notice">
    ⚠️ After payment, upload proof. Votes will be verified within minutes.
  </div>

  <div class="bank-box">
    <p><b>Bank:</b> Ecobank</p>
    <p><b>Account Name:</b> Kwara Talent Harvest</p>
    <p><b>Account Number:</b> 4820114717</p>
  </div>

  <h3 id="amount"></h3>

  <input id="payer" placeholder="Your Name" />
  <input id="reference" placeholder="Transfer Reference" />

  <input type="file" id="proof" />

  <button onclick="submitProof()">Upload Proof</button>

</div>

<script>
async function submitProof(){

  const payer = document.getElementById("payer").value;
  const reference = document.getElementById("reference").value;

  if (!payer || !reference) {
    alert("Fill all fields");
    return;
  }

  await fetch("/api/manual-payment",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      contestantId,
      votes,
      payer,
      reference
    })
  });

  alert("✅ Payment submitted. Await confirmation.");
  location.href="/vote.html";
}
</script>

</body>
</html>
