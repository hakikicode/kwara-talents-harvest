<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manual Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles/voting.css">
  <style>
    body {
      background: #0b0f1a;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .manual-container {
      max-width: 420px;
      margin: 120px auto 40px;
      padding: 24px;
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .bank-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .manual-container input,
    .manual-container button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #334155;
      box-sizing: border-box;
    }

    .manual-container input {
      background: #0f172a;
      color: #fff;
    }

    .manual-container button {
      background: #22c55e;
      color: #fff;
      cursor: pointer;
      border: none;
      font-weight: 700;
    }

    .manual-container button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .helper {
      color: #cbd5e1;
      font-size: 14px;
      margin: 10px 0 0;
    }
  </style>
</head>
<body>
  <header class="top">
    <a href="index.html"><img src="assets/logo.png" class="logo" alt="KTH Logo"></a>
    <button class="back" onclick="history.back()">Back to Event</button>
  </header>

  <div class="manual-container">
    <h2>Manual Payment</h2>

    <div class="bank-box">
      <p><b>Bank:</b> Ecobank</p>
      <p><b>Name:</b> Kwara Talent Harvest</p>
      <p><b>Account:</b> 4820114717</p>
    </div>

    <input id="amount" placeholder="Amount" readonly>
    <input id="payer" placeholder="Your Name">
    <input id="reference" placeholder="Transaction Reference">
    <input type="file" id="proof" accept="image/*">

    <p class="helper" id="manualSummary"></p>

    <button id="submitBtn" onclick="submitProof()">Submit Payment</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const contestantId = params.get("contestantId");
    const contestantName = params.get("contestantName") || contestantId;
    const queryTicketQty = params.get("ticketQty");
    const votes = Number(params.get("votes") || "0");
    const ticketQty = Number(queryTicketQty || "0");
    const paymentType = params.get("type") || (queryTicketQty ? "event-ticket" : "vote");
    const quantity = ticketQty > 0 ? ticketQty : votes;
    const amount = Number(params.get("amount") || (paymentType === "event-ticket" ? ticketQty * 50 : votes * 350) || 0);

    const amountInput = document.getElementById("amount");
    const summaryEl = document.getElementById("manualSummary");
    const submitBtn = document.getElementById("submitBtn");

    amountInput.value = amount > 0 ? `NGN ${amount.toLocaleString()}` : "";

    if (!contestantId || quantity <= 0) {
      summaryEl.textContent = "Buy a ticket or vote for your favourite contestant, then upload proof for approval.";
      submitBtn.disabled = true;
    } else {
      summaryEl.textContent = paymentType === "event-ticket"
        ? `Contestant: ${contestantName} | Tickets: ${quantity}`
        : `Contestant: ${contestantName} | Votes: ${quantity}`;
    }

    async function submitProof() {
      const payer = document.getElementById("payer").value.trim();
      const reference = document.getElementById("reference").value.trim();
      const file = document.getElementById("proof").files[0];

      if (!contestantId || quantity <= 0) {
        alert("Missing contestant or ticket/vote quantity.");
        return;
      }

      if (!payer || !reference || !file) {
        alert("Fill all fields and upload proof.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const reader = new FileReader();

      reader.onload = async () => {
        try {
          const res = await fetch("/api/manual-payment", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              contestantId,
              contestantName,
              ticketQty: ticketQty > 0 ? ticketQty : undefined,
              votes: votes > 0 ? votes : undefined,
              amount,
              payer,
              reference,
              proof: reader.result,
              email: params.get("email") || "",
              phone: params.get("phone") || "",
              type: paymentType
            })
          });

          const data = await res.json();

          if (!res.ok || !data.success) {
            throw new Error(data.error || "Failed to submit payment");
          }

          alert("Submitted! Await approval.");
          window.location.href = paymentType === "event-ticket" ? "/event.html" : "/vote.html";
        } catch (err) {
          alert(err.message || "Failed to submit payment.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Submit Payment";
        }
      };

      reader.onerror = () => {
        alert("Failed to read proof file.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Payment";
      };

      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
