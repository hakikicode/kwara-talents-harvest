<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manual Payment</title>
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles/voting.css">

<style>
body {
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#020617;
  padding:25px;
  border-radius:12px;
  width:320px;
  border:1px solid #1f2937;
}

input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#22c55e;
  color:#fff;
  cursor:pointer;
}
</style>
</head>
<body>
<header class="top">
  <a href="index.html"><img src="assets/logo.png" class="logo"></a>
  <button class="back" onclick="history.back()">← Back to Voting</button>
</header>
<div class="manual-container">

  <h2>💳 Manual Payment</h2>

  <div class="bank-box">
    <p><b>Bank:</b> Ecobank</p>
    <p><b>Name:</b> Kwara Talent Harvest</p>
    <p><b>Account:</b> 4820114717</p>
  </div>

  <h3 id="amount"></h3>

  <input id="payer" placeholder="Your Name">
  <input id="reference" placeholder="Transaction Reference">

  <input type="file" id="proof" accept="image/*">

  <button onclick="submitProof()">Submit Payment</button>

</div>

<script>
async function submitProof(){

  const payer = document.getElementById("payer").value;
  const reference = document.getElementById("reference").value;
  const file = document.getElementById("proof").files[0];

  if (!payer || !reference || !file) {
    alert("Fill all fields");
    return;
  }

  const reader = new FileReader();

  reader.onload = async () => {

    await fetch("/api/manual-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contestantId,
        votes,
        payer,
        reference,
        proof: reader.result
      })
    });

    alert("✅ Submitted! Await approval.");
    location.href = "/vote.html";
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
